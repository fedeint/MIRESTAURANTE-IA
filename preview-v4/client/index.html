<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leyavi Previewer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d2e;
  --elevated: #1e2235;
  --border: #2d3148;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --inactive: #64748b;
  --orange: #f97316;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
}

body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.toolbar-brand {
  font-weight: 700;
  font-size: 13px;
  color: var(--orange);
  white-space: nowrap;
  margin-right: 4px;
}

.url-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 10px;
  font-size: 12px;
  width: 260px;
  flex-shrink: 0;
  font-family: 'Inter', monospace;
}
.url-input:focus { outline: none; border-color: var(--orange); }

.sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

.btn {
  padding: 5px 11px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--elevated);
  color: var(--text);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
}
.btn:hover { background: var(--border); }
.btn-active { background: rgba(249,115,22,.15); color: var(--orange); border-color: rgba(249,115,22,.4); }
.btn-reload { color: var(--green); border-color: rgba(34,197,94,.3); }
.btn-reload:hover { background: rgba(34,197,94,.1); }

.zoom-group { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.zoom-label { font-size: 11px; color: var(--inactive); min-width: 36px; text-align: center; }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
  flex-shrink: 0;
  cursor: help;
}
.status-dot.off { background: var(--red); animation: none; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

/* ── Routes bar ── */
.routes-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 16px;
  background: #161825;
  border-bottom: 1px solid rgba(45,49,72,.5);
  flex-shrink: 0;
  overflow-x: auto;
}
.routes-bar-label { font-size: 10px; color: var(--inactive); flex-shrink: 0; margin-right: 2px; }

.route-chip {
  padding: 3px 9px;
  border-radius: 5px;
  background: var(--elevated);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
  flex-shrink: 0;
}
.route-chip:hover { color: var(--orange); border-color: rgba(249,115,22,.4); }
.route-chip.active { color: var(--orange); background: rgba(249,115,22,.1); border-color: rgba(249,115,22,.4); }

/* ── Devices area ── */
.devices-area {
  flex: 1;
  display: flex;
  gap: 24px;
  padding: 20px;
  overflow: auto;
  align-items: flex-start;
}

/* ── Device column ── */
.device-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.device-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--inactive);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.device-label .res { color: #475569; font-weight: 400; margin-left: 4px; }

.screen { background: #fff; }

/* ── Comments box ── */
.dc-box {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  max-width: 420px;
  margin-top: 4px;
}

.dc-head {
  display: flex;
  align-items: center;
  padding: 7px 10px;
  gap: 7px;
  border-bottom: 1px solid rgba(45,49,72,.5);
}

.dc-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); flex: 1; }
.dc-badge {
  background: var(--orange);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 6px;
  min-width: 16px;
  text-align: center;
}
.dc-clear {
  padding: 2px 5px;
  border-radius: 4px;
  border: 1px solid rgba(239,68,68,.3);
  background: transparent;
  color: var(--red);
  font-size: 9px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.dc-clear:hover { background: rgba(239,68,68,.1); }

.dc-list {
  max-height: 160px;
  overflow-y: auto;
  padding: 5px 7px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.07) transparent;
}
.dc-list:empty::after {
  content: 'Sin comentarios';
  color: var(--inactive);
  font-size: 10px;
  text-align: center;
  padding: 8px;
  display: block;
}

.dc-input-row {
  display: flex;
  gap: 4px;
  padding: 5px 7px 7px;
  border-top: 1px solid rgba(45,49,72,.5);
}

.dc-type-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  padding: 4px 5px;
  font-size: 10px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  flex-shrink: 0;
}
.dc-type-select:focus { outline: none; border-color: var(--orange); }

.dc-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  padding: 4px 7px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  min-width: 0;
}
.dc-input:focus { outline: none; border-color: var(--orange); }
.dc-input::placeholder { color: var(--inactive); }

.dc-send {
  padding: 4px 9px;
  border-radius: 5px;
  border: none;
  background: var(--orange);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
}
.dc-send:hover { background: #ea580c; }

/* ── Comment items ── */
.c-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 5px 8px;
  background: var(--bg);
  border-radius: 6px;
  border-left: 3px solid var(--border);
  font-size: 11px;
  line-height: 1.4;
}
.c-item.type-bug { border-left-color: var(--red); }
.c-item.type-fix { border-left-color: var(--yellow); }
.c-item.type-note { border-left-color: #6366f1; }
.c-item.type-ok  { border-left-color: var(--green); }

.c-tag { font-size: 12px; flex-shrink: 0; }
.c-text { color: var(--text); flex: 1; }
.c-meta { color: var(--inactive); font-size: 10px; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.c-route { color: var(--orange); font-family: monospace; font-size: 9px; }
.c-del { cursor: pointer; font-size: 13px; padding: 0 2px; }
.c-del:hover { color: var(--red); }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-brand">Leyavi ✦</div>

  <input type="text" class="url-input" id="urlInput" placeholder="http://localhost:1995" />

  <div class="sep"></div>

  <button class="btn btn-reload" id="reloadBtn" title="Reload todos (Cmd+R)">↻ Reload</button>

  <div class="sep"></div>

  <div class="zoom-group">
    <button class="btn" id="zoomOut" title="Zoom out">−</button>
    <span class="zoom-label" id="zoomLabel">70%</span>
    <button class="btn" id="zoomIn" title="Zoom in">+</button>
  </div>

  <div class="sep"></div>

  <button class="btn" data-toggle-dev="macbook" title="MacBook Pro 1440×900">🖥 Mac</button>
  <button class="btn" data-toggle-dev="windows" title="Windows PC 1366×768">💻 Win</button>
  <button class="btn" data-toggle-dev="ipad" title="iPad Air 820×1180">📋 iPad</button>
  <button class="btn btn-active" data-toggle-dev="iphone" title="iPhone 15 Pro 393×852">📱 iOS</button>
  <button class="btn" data-toggle-dev="android" title="Pixel 8 412×915">📱 And</button>

  <div class="sep"></div>

  <button class="btn btn-active" id="syncBtn" title="Toggle sync (S)">🔗 Sync ON</button>

  <div class="sep"></div>

  <div class="status-dot off" id="statusDot" title="Conexión app"></div>
</div>

<!-- ROUTES BAR (populated by app.js) -->
<div class="routes-bar" id="routesBar">
  <span class="routes-bar-label">Rutas:</span>
</div>

<!-- DEVICES AREA (populated by app.js + devices.js) -->
<div class="devices-area" id="devicesArea"></div>

<script src="devices.js"></script>
<script src="app.js"></script>
</body>
</html>
