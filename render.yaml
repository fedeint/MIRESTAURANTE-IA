services:
  - type: web
    name: dignita-restaurant
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MODO
        value: local
      - key: DATABASE_URL
        fromDatabase:
          name: dignita-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        value: https://dignita-restaurant.onrender.com
      - key: BASE_URL
        value: https://dignita-restaurant.onrender.com
      - key: CORS_ORIGIN
        value: https://dignita-restaurant.onrender.com
      - key: CSRF_SECRET
        generateValue: true
    healthCheckPath: /
    maxShutdownDelaySeconds: 30

databases:
  - name: dignita-db
    plan: free
    databaseName: dignita
    user: dignita_user
    postgresMajorVersion: "15"
